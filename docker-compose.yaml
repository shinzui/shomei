# A single-command local stack (EP-5): PostgreSQL + shomei-server. The server image is built
# from the Nix flake (`nix build .#dockerImage` then `docker load`), tagged `shomei-server:latest`.
# The server only starts once PostgreSQL is healthy; the entrypoint runs migrations and ensures
# an active signing key before serving.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shomei
      POSTGRES_PASSWORD: shomei
      POSTGRES_DB: shomei
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shomei -d shomei"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  shomei:
    image: shomei-server:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_CONNECTION_STRING: "host=postgres dbname=shomei user=shomei password=shomei"
      SHOMEI_PORT: "8080"
      SHOMEI_ISSUER: "shomei"
      SHOMEI_AUDIENCE: "shomei-clients"
    ports:
      - "8080:8080"
    healthcheck:
      # Readiness (DB reachable + active signing key); distinct from liveness /health.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
